services:
  - type: web
    name: zenith-backend
    runtime: docker
    plan: free
    autoDeployTrigger: checksPass
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "10000"
      - key: PORT
        value: "10000"
      - key: JWT_ACCESS_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: AUTH_REFRESH_COOKIE_NAME
        value: refresh_token
      - key: AUTH_REFRESH_COOKIE_PATH
        value: /api/v1/auth
      - key: AUTH_REFRESH_COOKIE_SECURE
        value: "true"
      - key: AUTH_REFRESH_COOKIE_SAME_SITE
        value: Strict
      - key: AUTH_REFRESH_COOKIE_DOMAIN
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
