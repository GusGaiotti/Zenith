spring:
  application:
    name: zenith
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zenith}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${PORT:${SERVER_PORT:8080}}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

auth:
  refresh-cookie:
    name: ${AUTH_REFRESH_COOKIE_NAME:refresh_token}
    path: ${AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}
    same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
    domain: ${AUTH_REFRESH_COOKIE_DOMAIN:}

ai:
  mode: ${AI_MODE:off}
  timeout-ms: ${AI_TIMEOUT_MS:8000}
  max-response-tokens: ${AI_MAX_RESPONSE_TOKENS:300}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.1:8b}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
